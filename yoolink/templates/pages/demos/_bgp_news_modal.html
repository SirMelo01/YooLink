{% comment %}
Geteilte Detailansicht fuer Meldungen (Startseite + Aktuelles-Unterseite).
Erwartet Elemente mit data-news, die data-news-kicker, -date, -title und
ein <template data-news-body> enthalten. Wird im Block demo_js eingebunden,
damit bgpOpenModal aus der Huelle bereits definiert ist.
{% endcomment %}

<div id="bgpNewsModal" class="bgp-modal" role="dialog" aria-modal="true" aria-labelledby="bgpNewsModalTitle">
  <div class="bgp-modal-panel">
    <div class="bgp-bg-navy flex items-center justify-between gap-4 px-6 py-4 sm:px-8">
      <div class="flex flex-wrap items-center gap-x-4 gap-y-1">
        <span id="bgpNewsModalKicker" class="text-xs font-bold uppercase tracking-wider text-white/80"></span>
        <span id="bgpNewsModalDate" class="bgp-text-yellow text-xs font-bold"></span>
      </div>
      <button type="button" data-modal-close class="bgp-focus -mr-2 rounded-lg p-2 text-white/70 transition hover:bg-white/10 hover:text-white" aria-label="Meldung schließen">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="max-h-[70vh] overflow-y-auto px-6 py-7 sm:px-8">
      <h2 id="bgpNewsModalTitle" class="bgp-text-navy-dark mb-5 text-2xl font-bold leading-snug"></h2>
      <div id="bgpNewsModalBody" class="bgp-prose text-base"></div>
    </div>
    <div class="flex flex-col gap-3 border-t border-gray-100 bg-gray-50 px-6 py-5 sm:flex-row sm:items-center sm:justify-between sm:px-8">
      <p class="text-xs text-gray-500">Demo-Ansicht - im CMS wird daraus eine echte Detailseite.</p>
      <button type="button" data-modal-close class="bgp-btn-navy bgp-focus inline-flex items-center justify-center gap-2 rounded-lg px-5 py-2.5 text-sm font-bold transition">
        Schließen
      </button>
    </div>
  </div>
</div>

<script>
  /* Oeffnet die simulierte Detailansicht fuer jede Meldung auf der Seite */
  (function () {
    var modal = document.getElementById('bgpNewsModal');
    var kicker = document.getElementById('bgpNewsModalKicker');
    var date = document.getElementById('bgpNewsModalDate');
    var title = document.getElementById('bgpNewsModalTitle');
    var body = document.getElementById('bgpNewsModalBody');

    function textOf(item, selector) {
      var el = item.querySelector(selector);
      return el ? el.textContent.trim() : '';
    }

    function openNews(item) {
      kicker.textContent = textOf(item, '[data-news-kicker]');
      date.textContent = textOf(item, '[data-news-date]');
      title.textContent = textOf(item, '[data-news-title]');

      body.innerHTML = '';
      var tpl = item.querySelector('[data-news-body]');
      if (tpl) { body.appendChild(tpl.content.cloneNode(true)); }

      bgpOpenModal(modal);
    }

    document.querySelectorAll('[data-news]').forEach(function (item) {
      item.addEventListener('click', function () { openNews(item); });
      item.addEventListener('keydown', function (event) {
        if (event.key !== 'Enter' && event.key !== ' ') { return; }
        event.preventDefault();
        openNews(item);
      });
    });
  })();
</script>
