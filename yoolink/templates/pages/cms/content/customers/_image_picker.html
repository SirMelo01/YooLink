{# Image Picker Card - re-usable partial. Inputs: target, label, hint, image, rounded_class, placeholder_icon, placeholder_label #}
<div class="flex h-full flex-col">
    <div class="flex min-h-[1.5rem] items-baseline justify-between gap-2">
        <label class="text-sm font-semibold text-gray-700">{{ label }}</label>
        <span class="text-[11px] text-gray-400">{{ hint }}</span>
    </div>
    <div class="relative mt-2 overflow-hidden rounded-xl border-2 border-dashed border-gray-200 bg-gradient-to-br from-blue-50/40 to-white">
        <div class="relative aspect-[16/10] w-full">
            <img id="{{ target }}Preview"
                src="{% if image and image.file %}{{ image.file.url }}{% endif %}"
                data-image-id="{{ image.id|default:'-1' }}"
                class="absolute inset-0 h-full w-full {{ rounded_class|default:'rounded-xl object-cover' }} {% if not image %}hidden{% endif %}"
                alt="{{ label }}">
            <div id="{{ target }}Placeholder"
                class="absolute inset-0 flex flex-col items-center justify-center text-blue-300 {% if image %}hidden{% endif %}">
                <i class="bi {{ placeholder_icon|default:'bi-image' }} text-4xl"></i>
                <span class="mt-2 text-xs font-semibold uppercase tracking-wider text-blue-400">{{ placeholder_label|default:'Kein Bild' }}</span>
            </div>
        </div>
    </div>
    <div class="mt-auto grid grid-cols-2 gap-2 pt-3">
        <button type="button"
            class="customer-image-select inline-flex h-9 items-center justify-center gap-1.5 rounded-lg bg-blue-600 px-3 text-xs font-semibold text-white transition hover:bg-blue-700"
            data-target="{{ target }}">
            <i class="bi bi-card-image"></i>
            <span>Wählen</span>
        </button>
        <button type="button"
            class="customer-image-clear inline-flex h-9 items-center justify-center gap-1.5 rounded-lg bg-gray-100 px-3 text-xs font-semibold text-gray-700 transition hover:bg-gray-200"
            data-target="{{ target }}">
            <i class="bi bi-x-lg"></i>
            <span>Entfernen</span>
        </button>
    </div>
</div>
