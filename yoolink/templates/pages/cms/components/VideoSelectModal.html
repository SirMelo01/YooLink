<!-- **************** Video-Select-Modal **************** -->
<div class="fixed inset-0 bg-gray-500 bg-opacity-75 flex items-center justify-center z-50 hidden p-3"
     id="videoModal">
  <div class="modal-container w-full max-w-4xl max-h-[92vh] overflow-hidden rounded-lg bg-white p-3 shadow-lg sm:p-4">

    <!-- Header -->
    <div class="flex items-start justify-between p-4 border-b rounded-t dark:border-gray-600">
      <h3 class="text-xl font-semibold text-gray-900">
        Video auswählen
      </h3>
      <button type="button" id="closeVideoModal"
              class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900
                     rounded-lg text-sm p-1.5 ml-auto inline-flex items-center">
        <!-- Heroicons X -->
        <svg aria-hidden="true" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
            clip-rule="evenodd"></path>
        </svg>
        <span class="sr-only">Close modal</span>
      </button>
    </div>

    <!-- Body -->
    <div class="max-h-[60vh] overflow-auto p-3 sm:p-6">
      <div id="possibleVideos"
           class="grid w-full grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
        <!-- Videos kommen per AJAX hier rein -->
      </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-col justify-center gap-2 py-4 sm:flex-row">
      <button id="reloadVideos"
              class="rounded-xl bg-blue-500 px-4 py-3 text-base font-bold text-white hover:bg-blue-700 sm:py-2">
        <i class="bi bi-arrow-clockwise"></i> Neu laden
      </button>
      <a href="{% url 'cms:list_videos' %}" target="_blank"
         class="rounded-xl bg-green-500 px-4 py-3 text-center text-base font-bold text-white hover:bg-green-700 sm:py-2">
        Videos verwalten <i class="bi bi-box-arrow-up-right"></i> 
      </a>
    </div>
  </div>
</div>
