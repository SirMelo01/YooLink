{% comment %}
Compact KPI stat card. Params: icon, tone, value, label, link_url (optional).
{% endcomment %}
<a {% if link_url %}href="{{ link_url }}"{% endif %}
   class="group flex items-center gap-3 rounded-2xl border border-gray-200 bg-white p-4 shadow-sm transition hover:-translate-y-0.5 hover:border-gray-300 hover:shadow-md">
    {% include "pages/cms/components/_icon_chip.html" with tone=tone icon=icon cls="h-11 w-11 text-xl" %}
    <div class="min-w-0">
        <p class="text-2xl font-bold leading-none text-gray-900">{{ value|default:"0" }}</p>
        <p class="mt-1 truncate text-xs font-medium text-gray-500">{{ label }}</p>
    </div>
</a>
