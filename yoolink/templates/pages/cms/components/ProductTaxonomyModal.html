<!-- Product Taxonomy Select Modal (Gruppierung / Hersteller / Kategorien) -->
<style>
  #taxonomyModal:not(.hidden) {
    display: flex;
  }
</style>

<div class="fixed inset-0 z-[80] hidden items-center justify-center bg-slate-950/70 p-2 backdrop-blur-sm sm:p-4" id="taxonomyModal">
  <div class="flex h-[calc(100dvh-1rem)] w-full max-w-3xl flex-col overflow-hidden rounded-lg bg-white shadow-2xl ring-1 ring-slate-200 sm:h-auto sm:max-h-[90vh]">
    <div class="flex flex-shrink-0 items-start justify-between border-b border-slate-200 px-4 py-4 sm:px-6 sm:py-5">
      <div>
        <p class="text-xs font-semibold uppercase tracking-wide text-blue-700">Zuordnung</p>
        <h3 id="taxonomyModalTitle" class="mt-1 text-2xl font-semibold text-slate-950">Auswählen</h3>
        <p id="taxonomyModalSubtitle" class="mt-1 text-sm text-slate-500">Wähle aus bestehenden Einträgen oder lege neue an.</p>
      </div>
      <button
        type="button"
        id="closeTaxonomyModal"
        class="rounded-md p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-900"
      >
        <svg aria-hidden="true" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
        </svg>
        <span class="sr-only">Schließen</span>
      </button>
    </div>

    <div class="flex min-h-0 flex-1 flex-col overflow-y-auto p-4 sm:p-6">
      <div class="mb-4 flex flex-col gap-2 sm:flex-row">
        <div class="relative flex-1">
          <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
            <i class="bi bi-search text-sm"></i>
          </span>
          <input
            id="taxonomySearch"
            type="search"
            placeholder="Suchen"
            class="w-full rounded-md border border-slate-300 py-2.5 pl-9 pr-3 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
          >
        </div>
      </div>

      <div class="min-h-[14rem] flex-1 overflow-auto rounded-lg border border-slate-200 bg-slate-50 p-3">
        <div id="taxonomyList" class="grid grid-cols-1 gap-2 sm:grid-cols-2"></div>
        <div id="taxonomyEmptyState" class="hidden py-12 text-center">
          <p id="taxonomyEmptyTitle" class="text-base font-semibold text-slate-700">Keine Einträge gefunden</p>
          <p class="mt-1 text-sm text-slate-500">Lege unten direkt einen neuen Eintrag an.</p>
        </div>
        <div id="taxonomyLoading" class="hidden py-12 text-center text-sm text-slate-500">Wird geladen…</div>
      </div>

      <div class="mt-4 rounded-lg border border-dashed border-slate-300 bg-white p-3">
        <p id="taxonomyCreateLabel" class="text-xs font-semibold uppercase tracking-wide text-slate-500">Neu anlegen</p>
        <div class="mt-2 flex flex-col gap-2 sm:flex-row">
          <input
            id="taxonomyCreateInput"
            type="text"
            maxlength="255"
            placeholder="Name des neuen Eintrags"
            class="flex-1 rounded-md border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
          >
          <button
            id="taxonomyCreateBtn"
            type="button"
            class="inline-flex items-center justify-center gap-2 rounded-md bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-700"
          >
            <i class="bi bi-plus-lg"></i> Anlegen
          </button>
        </div>
      </div>
    </div>

    <div class="flex flex-shrink-0 flex-col gap-3 border-t border-slate-200 bg-white px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6 sm:py-4">
      <p id="taxonomySelectionInfo" class="text-sm text-slate-500"></p>
      <button
        type="button"
        id="confirmTaxonomy"
        class="rounded-md bg-blue-600 px-5 py-2 text-sm font-semibold text-white transition hover:bg-blue-700"
      >
        Auswahl übernehmen
      </button>
    </div>
  </div>
</div>
