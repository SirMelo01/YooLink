<!-- **************** Galery-Select-Modal **************** -->
<!-- Will be opened if the user clicks on one of the info buttons -->
<div class="fixed inset-0 bg-gray-500 bg-opacity-75 flex items-center justify-center z-50 hidden p-3"
    id="galeryModal">
    <div class="modal-container w-full max-w-4xl max-h-[92vh] overflow-hidden rounded-lg bg-white p-3 shadow-lg sm:p-4">
        <!-- Modal header -->
        <div class="flex items-start justify-between p-4 border-b rounded-t dark:border-gray-600">
            <h3 class="text-xl font-semibold text-gray-900" id="infoTitle">
                Galerieauswahl
            </h3>
            <button type="button" id="closeGaleryModal"
                class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm p-1.5 ml-auto inline-flex items-center dark:hover:bg-gray-600 dark:hover:text-white"
                data-modal-hide="defaultModal">
                <svg aria-hidden="true" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"
                    xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd"
                        d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                        clip-rule="evenodd"></path>
                </svg>
                <span class="sr-only">Close modal</span>
            </button>
        </div>
        <!-- Modal body -->
        <div class="p-3 sm:p-6">
            <div class="grid max-h-[60vh] w-full max-w-5xl grid-cols-1 gap-3 overflow-auto overflow-x-hidden p-2 sm:grid-cols-2 lg:grid-cols-3"
                id="possibleGalerien">
                
            </div>
        </div>
        <!-- Actions -->
        <div class="flex flex-col justify-center gap-2 border-t border-gray-200 py-4 sm:flex-row">
            <button id="reloadGalerien"
                class="rounded-xl bg-blue-500 px-4 py-3 text-base font-bold text-white hover:bg-blue-700 sm:py-2">Neu
                Laden</button>
            <a href="{% url 'cms:galerien' %}" target="_blank"
                class="rounded-xl bg-green-500 px-4 py-3 text-center text-base font-bold text-white hover:cursor-pointer hover:bg-green-700 sm:py-2">Verwalten</a>
        </div>
    </div>
</div>
