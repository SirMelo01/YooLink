<div class="fixed inset-0 z-50 hidden items-center justify-center bg-gray-500 bg-opacity-75 p-3" id="anyFileModal">
  <div class="modal-container max-h-[92vh] w-full max-w-5xl overflow-hidden rounded-2xl bg-white p-3 shadow-lg sm:p-4">
    <div class="flex items-start justify-between gap-3 border-b p-3 sm:p-4">
      <div>
        <h3 class="text-xl font-semibold text-gray-900">Dateien auswählen</h3>
        <p class="text-sm text-gray-500">Mehrere Dateien gleichzeitig dem Produkt zuordnen</p>
      </div>
      <button
        type="button"
        id="closeAnyFileModal"
        class="rounded-lg p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-800"
      >
        ✕
      </button>
    </div>

    <div class="p-3 sm:p-4">
      <div class="mb-4 grid grid-cols-1 gap-3 sm:grid-cols-[1fr_auto_auto] sm:items-center">
        <input
          id="anyFileSearch"
          type="text"
          placeholder="Datei suchen"
          class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-2 focus:border-blue-500 focus:bg-white focus:outline-none"
        >
        <button
          id="reloadAnyFiles"
          type="button"
          class="rounded-xl bg-blue-500 px-4 py-3 font-semibold text-white hover:bg-blue-700 sm:py-2"
        >
          Laden
        </button>
        <a
          href="{% url 'cms:anyfile-list' %}"
          target="_blank"
          class="rounded-xl bg-green-500 px-4 py-3 text-center font-semibold text-white hover:bg-green-700 sm:py-2"
        >
          Verwalten
        </a>
      </div>

      <div id="possibleAnyFiles" class="grid max-h-[32rem] grid-cols-1 gap-3 overflow-y-auto md:grid-cols-2 xl:grid-cols-3">
      </div>
    </div>

    <div class="flex justify-end border-t p-4">
      <button
        type="button"
        id="confirmAnyFiles"
        class="w-full rounded-xl bg-blue-500 px-5 py-3 font-semibold text-white hover:bg-blue-700 sm:w-auto sm:py-2"
      >
        Auswahl übernehmen
      </button>
    </div>
  </div>
</div>
