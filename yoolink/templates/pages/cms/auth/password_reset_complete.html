{% extends "cms-login-base.html" %}

{% block title %}{{ block.super }} | Passwort geändert{% endblock title %}

{% block content %}
<section class="text-gray-600 body-font bg-gray-100 min-h-screen flex justify-center items-center">
    <div class="bg-white shadow-lg rounded-2xl p-10 max-w-2xl w-full mx-5 text-center">
        <h1 class="text-3xl font-bold text-blue-600">Passwort erfolgreich geändert</h1>
        <p class="mt-4 text-lg text-gray-700">
            Sie können sich jetzt mit Ihrem neuen Passwort anmelden.
        </p>
        <a href="{% url 'ycms:login' %}" class="inline-block mt-8 bg-blue-500 text-white px-6 py-3 rounded-full hover:bg-blue-600 transition">
            Zum Login
        </a>
    </div>
</section>
{% endblock content %}
