{% extends "cmsbase.html" %}

{% block title %}{{ block.super }} | Passwort geändert{% endblock title %}

{% block content %}
<section class="max-w-3xl mx-auto px-6 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">
        <h1 class="text-3xl font-bold text-gray-900">Passwort erfolgreich geändert</h1>
        <p class="mt-3 text-gray-600">
            Ihr Passwort wurde aktualisiert.
        </p>
        <a href="{% url 'ycms:cms' %}" class="inline-block mt-8 px-6 py-3 rounded-full bg-blue-600 text-white hover:bg-blue-700 transition">
            Zurück zum CMS
        </a>
    </div>
</section>
{% endblock content %}
