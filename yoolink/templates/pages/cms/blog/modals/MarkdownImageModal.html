<div class="fixed inset-0 z-[80] hidden items-center justify-center bg-slate-950/70 p-2 backdrop-blur-sm sm:p-4"
    id="markdownImageModal">
    <div class="modal-container markdown-image-modal-container flex h-[calc(100dvh-1rem)] w-full max-w-6xl flex-col overflow-hidden rounded-lg bg-white shadow-2xl ring-1 ring-slate-200 sm:h-auto sm:max-h-[90vh]">
        <div class="flex flex-shrink-0 items-start justify-between border-b border-slate-200 px-4 py-4 sm:px-6 sm:py-5">
            <div>
                <p class="text-xs font-semibold uppercase tracking-wide text-blue-700">Markdown</p>
                <h3 class="mt-1 text-2xl font-semibold text-slate-950">Bild einfügen</h3>
            </div>
            <button type="button" id="closeMarkdownImageModal"
                class="rounded-md p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-900">
                <svg aria-hidden="true" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"
                    xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd"
                        d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                        clip-rule="evenodd"></path>
                </svg>
                <span class="sr-only">Schließen</span>
            </button>
        </div>

        <div class="grid min-h-0 flex-1 grid-cols-1 overflow-y-auto lg:grid-cols-[18rem_minmax(0,1fr)]">
            <aside class="border-b border-slate-200 bg-slate-50 p-3 sm:p-4 lg:border-b-0 lg:border-r">
                <div class="grid grid-cols-2 gap-2 lg:grid-cols-1">
                    <button type="button" id="markdownImageLibraryTab"
                        class="markdown-image-tab rounded-md bg-blue-900 px-4 py-3 text-left text-sm font-semibold text-white shadow-sm"
                        data-target="markdownImageLibraryPanel">
                        <span class="block">Mediathek</span>
                        <span class="mt-1 block text-xs font-normal text-blue-100">Vorhandenes Bild</span>
                    </button>
                    <button type="button" id="markdownImageUploadTab"
                        class="markdown-image-tab rounded-md px-4 py-3 text-left text-sm font-semibold text-slate-700 transition hover:bg-white hover:text-slate-950"
                        data-target="markdownImageUploadPanel">
                        <span class="block">Upload</span>
                        <span class="mt-1 block text-xs font-normal text-slate-500">Neue Datei</span>
                    </button>
                </div>

                <div class="mt-6 rounded-lg border border-slate-200 bg-white p-4">
                    <p class="text-sm font-semibold text-slate-900">Auswahl</p>
                    <div class="mt-3 aspect-video overflow-hidden rounded-md bg-slate-100">
                        <img id="markdownImageSelectedPreview" src="" alt="Ausgewähltes Bild"
                            class="hidden h-full w-full object-cover" />
                        <div id="markdownImageSelectedPlaceholder"
                            class="flex h-full items-center justify-center px-4 text-center text-sm text-slate-400">
                            Kein Bild ausgewählt
                        </div>
                    </div>
                </div>

                <div class="mt-4 space-y-3 rounded-lg border border-slate-200 bg-white p-4">
                    <label class="block text-sm font-semibold text-slate-900" for="markdownImageAlt">Alt-Text</label>
                    <input id="markdownImageAlt" type="text"
                        class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
                        placeholder="Beschreibender Bildtext">

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500" for="markdownImageWidth">Breite</label>
                            <input id="markdownImageWidth" type="text"
                                class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
                                placeholder="100%">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500" for="markdownImageHeight">Höhe</label>
                            <input id="markdownImageHeight" type="text"
                                class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
                                placeholder="auto">
                        </div>
                    </div>
                </div>
            </aside>

            <div class="min-h-0 p-4 sm:p-6">
                <section id="markdownImageLibraryPanel" class="markdown-image-panel flex min-h-0 flex-col lg:h-full">
                    <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                        <h4 class="text-lg font-semibold text-slate-950">Mediathek</h4>
                        <div class="flex gap-2">
                            <input id="markdownImageSearchInput" type="search" placeholder="Bilder suchen"
                                class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100 sm:w-56">
                            <button id="reloadMarkdownImages" type="button"
                                class="rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700">
                                Laden
                            </button>
                        </div>
                    </div>

                    <div class="min-h-[18rem] flex-1 overflow-auto rounded-lg border border-slate-200 bg-slate-50 p-3">
                        <div class="grid grid-cols-2 gap-3 sm:grid-cols-3 xl:grid-cols-4" id="markdownImageLibrary"></div>
                        <div id="markdownImageEmpty" class="hidden py-16 text-center">
                            <p class="text-base font-semibold text-slate-700">Keine Bilder gefunden</p>
                        </div>
                    </div>
                </section>

                <section id="markdownImageUploadPanel" class="markdown-image-panel hidden min-h-0 flex-col lg:h-full">
                    <h4 class="mb-4 text-lg font-semibold text-slate-950">Upload</h4>
                    <div id="markdownImageUploadDropzone"
                        class="flex min-h-[18rem] flex-1 cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed border-blue-200 bg-blue-50/60 px-6 py-10 text-center transition hover:border-blue-400 hover:bg-blue-50">
                        <div class="flex h-14 w-14 items-center justify-center rounded-full bg-white text-blue-700 shadow-sm">
                            <i class="bi bi-cloud-arrow-up text-3xl"></i>
                        </div>
                        <p class="mt-5 text-lg font-semibold text-slate-950">Bilddatei auswählen</p>
                        <p id="markdownImageSelectedFileName" class="mt-2 text-sm text-slate-500">JPG, PNG, GIF oder WebP</p>
                        <input id="markdownImageFile" class="hidden" type="file" accept="image/jpg,image/png,image/jpeg,image/gif,image/webp,image/*">
                    </div>
                </section>
            </div>
        </div>

        <div class="flex flex-shrink-0 flex-col gap-3 border-t border-slate-200 bg-white px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6 sm:py-4">
            <button type="button" id="cancelMarkdownImage"
                class="inline-flex items-center justify-center rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 hover:text-slate-950">
                Abbrechen
            </button>
            <button type="button" id="insertMarkdownImage"
                class="inline-flex items-center justify-center rounded-md bg-blue-700 px-5 py-2 text-sm font-semibold text-white transition hover:bg-blue-800 disabled:cursor-not-allowed disabled:opacity-50">
                Einfügen
            </button>
        </div>
    </div>
</div>
