<!-- **************** Preview-Modal **************** -->
<!-- Will be opened if the user clicks on one of the info buttons -->
<div class="fixed inset-0 z-[90] hidden items-center justify-center bg-slate-900/70 p-3 backdrop-blur-sm modal"
    id="previewModal" data-prismjs-copy-timeout="500">
    <div class="modal-container mx-auto flex max-h-[92vh] w-full max-w-4xl flex-col overflow-hidden rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200">
        <!-- Modal header -->
        <div class="flex flex-shrink-0 items-center gap-3 border-b border-slate-100 px-5 py-4">
            <span class="grid h-10 w-10 flex-shrink-0 place-items-center rounded-xl bg-blue-100 text-blue-600"><i class="bi bi-eye text-lg"></i></span>
            <div class="min-w-0 flex-1">
                <p class="text-xs font-semibold uppercase tracking-wide text-blue-600">Blog</p>
                <h3 class="text-lg font-semibold text-slate-900" id="infoTitle">Vorschau</h3>
            </div>
            <button type="button" id="closeModal"
                class="grid h-9 w-9 flex-shrink-0 place-items-center rounded-xl text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
                data-modal-hide="defaultModal">
                <i class="bi bi-x-lg"></i>
                <span class="sr-only">Schließen</span>
            </button>
        </div>
        <div class="flex-1 space-y-6 overflow-auto p-4 sm:p-6" id="previewBody">
        </div>

    </div>
</div>
