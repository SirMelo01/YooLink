<div class="fixed inset-0 z-[80] hidden items-center justify-center bg-slate-950/70 p-2 backdrop-blur-sm sm:p-4 modal"
    id="videoModal">
    <div class="modal-container flex h-[calc(100dvh-1rem)] w-full max-w-6xl flex-col overflow-hidden rounded-lg bg-white shadow-2xl ring-1 ring-slate-200 sm:h-auto sm:max-h-[90vh]">
        <div class="flex flex-shrink-0 items-start justify-between border-b border-slate-200 px-4 py-4 sm:px-6 sm:py-5">
            <div>
                <p class="text-xs font-semibold uppercase tracking-wide text-blue-700">Blog Builder</p>
                <h3 class="mt-1 text-2xl font-semibold text-slate-950">Video bearbeiten</h3>
                <p class="mt-1 text-sm text-slate-500">Wähle ein CMS-Video und pflege Titel, SEO-Daten und Wiedergabeoptionen.</p>
            </div>
            <button type="button" id="closeVideoModal"
                class="rounded-md p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-900">
                <i class="bi bi-x-lg"></i>
                <span class="sr-only">Schließen</span>
            </button>
        </div>

        <div class="grid min-h-0 flex-1 grid-cols-1 overflow-y-auto lg:grid-cols-[minmax(0,1fr)_22rem]">
            <div class="min-h-0 p-4 sm:p-6">
                <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <h4 class="text-lg font-semibold text-slate-950">CMS-Videos</h4>
                        <p class="text-sm text-slate-500">Die Auswahl ersetzt die Videoquelle im aktuellen Blog-Element.</p>
                    </div>
                    <button id="reloadCMSVideos" type="button"
                        class="w-fit rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700">
                        Videos laden
                    </button>
                </div>
                <div class="min-h-[22rem] overflow-auto rounded-lg border border-slate-200 bg-slate-50 p-3">
                    <div id="availableVideos" class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
                    <p id="videoEmptyState" class="hidden py-16 text-center text-sm font-semibold text-slate-500">Keine Videos verfügbar.</p>
                </div>
            </div>

            <aside id="videoProperties" class="border-t border-slate-200 bg-slate-50 p-4 sm:p-6 lg:border-l lg:border-t-0">
                <input type="hidden" id="selectedVideoId">
                <div class="rounded-lg border border-slate-200 bg-white p-4">
                    <p class="text-sm font-semibold text-slate-900">Aktuelles Video</p>
                    <p id="selectedVideoLabel" class="mt-1 text-sm text-slate-500">Keine neue Auswahl</p>
                </div>

                <div class="mt-4 space-y-4 rounded-lg border border-slate-200 bg-white p-4">
                    <h4 class="text-lg font-semibold text-slate-950">Eigenschaften</h4>
                    <label class="block text-sm font-semibold text-slate-900">
                        Titel
                        <input id="videoTitle" type="text"
                            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
                    </label>
                    <label class="block text-sm font-semibold text-slate-900">
                        Alt-Text
                        <input id="videoAlt" type="text"
                            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
                    </label>
                    <label class="block text-sm font-semibold text-slate-900">
                        Beschreibung
                        <textarea id="videoDescription" rows="3"
                            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"></textarea>
                    </label>
                    <label class="block text-sm font-semibold text-slate-900">
                        Tags
                        <input id="videoTags" type="text"
                            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
                            placeholder="Kommagetrennt">
                    </label>
                    <label class="block text-sm font-semibold text-slate-900">
                        Dauer
                        <input id="videoDuration" type="text"
                            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
                            placeholder="PT2M30S">
                    </label>

                    <div class="grid grid-cols-2 gap-3">
                        <label class="block text-sm font-semibold text-slate-900">
                            Breite
                            <input id="videoWidth" type="text"
                                class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
                                placeholder="100%">
                        </label>
                        <label class="block text-sm font-semibold text-slate-900">
                            Höhe
                            <input id="videoHeight" type="text"
                                class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
                                placeholder="auto">
                        </label>
                    </div>

                    <label class="block text-sm font-semibold text-slate-900">
                        Preload
                        <select id="videoPreload"
                            class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
                            <option value="metadata">Metadata</option>
                            <option value="auto">Auto</option>
                            <option value="none">None</option>
                        </select>
                    </label>

                    <div class="grid grid-cols-1 gap-2 sm:grid-cols-2">
                        <label class="flex items-center gap-2 rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-700">
                            <input type="checkbox" id="videoControls" checked> Controls
                        </label>
                        <label class="flex items-center gap-2 rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-700">
                            <input type="checkbox" id="videoAutoplay"> Autoplay
                        </label>
                        <label class="flex items-center gap-2 rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-700">
                            <input type="checkbox" id="videoMuted"> Muted
                        </label>
                        <label class="flex items-center gap-2 rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-700">
                            <input type="checkbox" id="videoLoop"> Loop
                        </label>
                        <label class="flex items-center gap-2 rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold text-slate-700 sm:col-span-2">
                            <input type="checkbox" id="videoPlaysinline"> Playsinline
                        </label>
                    </div>
                </div>
            </aside>
        </div>

        <div class="flex flex-shrink-0 flex-col gap-3 border-t border-slate-200 bg-white px-4 py-3 sm:flex-row sm:items-center sm:justify-between sm:px-6 sm:py-4">
            <a href="{% url 'cms:create_video' %}" target="_blank"
                class="inline-flex items-center justify-center rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 hover:text-slate-950">
                <i class="bi bi-box-arrow-up-right mr-2"></i>
                Video hochladen
            </a>
            <button id="selectVideo" type="button"
                class="inline-flex items-center justify-center rounded-md bg-blue-700 px-5 py-2 text-sm font-semibold text-white transition hover:bg-blue-800">
                Übernehmen
            </button>
        </div>
    </div>
</div>
