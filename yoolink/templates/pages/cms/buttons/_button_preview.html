{% comment %}Live-Vorschau (Mini-Designer) für den Button-Designer.{% endcomment %}
<div class="lg:sticky lg:top-24">
    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400">Live-Vorschau</h2>
        <div class="mt-4 grid place-items-center rounded-xl border border-dashed border-slate-300 bg-slate-50 px-4 py-10">
            <a id="buttonPreviewLight" href="#" onclick="return false;" class="pointer-events-none">Button</a>
        </div>
        <div class="mt-3 grid place-items-center rounded-xl bg-blue-900 px-4 py-10">
            <a id="buttonPreviewDark" href="#" onclick="return false;" class="pointer-events-none">Button</a>
        </div>
        <p class="mt-3 text-xs text-slate-400">So sieht der Button auf hellem und dunklem Hintergrund aus.</p>
        <dl class="mt-4 space-y-2 border-t border-slate-100 pt-4 text-sm">
            <div class="flex items-start justify-between gap-3">
                <dt class="flex-shrink-0 text-slate-400">Führt zu</dt>
                <dd id="previewHref" class="break-all text-right font-medium text-slate-700">–</dd>
            </div>
            <div class="flex items-center justify-between gap-3">
                <dt class="text-slate-400">Öffnet</dt>
                <dd id="previewTarget" class="font-medium text-slate-700">im gleichen Tab</dd>
            </div>
        </dl>
    </div>
</div>
